name: Bug report
description: Report a reproducible problem in the project
title: "Bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do not attach real invoices, contracts, databases, private credentials, or business records.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: Describe the problem clearly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reproducible sequence of actions.
      placeholder: |
        1. Start the backend
        2. Open the frontend
        3. Upload an anonymized sample document
        4. Observe the failure
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or commit hash

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Python version, Node.js version, browser, and any relevant setup details.
      placeholder: |
        OS:
        Python:
        Node.js:
        Browser:

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs after removing sensitive data.
      render: shell
